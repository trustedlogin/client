name: E2E

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout client repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install npm deps
        working-directory: tests/e2e
        run: npm ci || npm install

      # Playwright pins browser binary versions to its own version. Key
      # the cache on package-lock.json so a Playwright bump invalidates.
      - name: Read Playwright version
        id: pw
        working-directory: tests/e2e
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            # Cache hit: browsers are present, but apt OS deps aren't —
            # install just the system libs (fast, ~10s).
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Start docker stack
        working-directory: tests/e2e
        run: docker compose up -d --wait

      # Pre-resolve branch HEAD SHAs so the cache key invalidates the
      # moment connector or gravityforms get a new commit. Falls back to
      # branch name if the API call fails — cache will still hit on a
      # later run that successfully resolved the same branch.
      - name: Resolve connector + GF SHAs for cache key
        id: refs
        env:
          GH_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          CONNECTOR_BRANCH: feature/183-form-plugins-login-field
          GF_BRANCH: master
        run: |
          conn=$(gh api "repos/trustedlogin/trustedlogin-connector/commits/${CONNECTOR_BRANCH}" --jq '.sha' 2>/dev/null || echo "")
          gf=$(gh api "repos/gravityforms/gravityforms/commits/${GF_BRANCH}" --jq '.sha' 2>/dev/null || echo "")
          # bootstrap-vendor.sh content hash so cherry-picks / fixture changes
          # invalidate the cache too.
          boot=$(sha256sum tests/e2e/fixtures/bootstrap-vendor.sh | cut -c1-12)
          echo "conn=${conn:-${CONNECTOR_BRANCH//\//-}}" >> "$GITHUB_OUTPUT"
          echo "gf=${gf:-$GF_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "boot=$boot" >> "$GITHUB_OUTPUT"

      # Cache the entire connector fixture dir incl. .git, vendor/, node_modules/,
      # build/, wpbuild/. clone_with_token in bootstrap detects the existing
      # .git and does fetch+reset instead of a full re-clone; composer install
      # and yarn build are skipped by their existing file-marker checks.
      - name: Restore connector fixture
        id: connector-cache
        uses: actions/cache@v4
        with:
          path: tests/e2e/fixtures/trustedlogin-connector
          key: connector-fixture-${{ runner.os }}-${{ steps.refs.outputs.conn }}-${{ steps.refs.outputs.boot }}
          restore-keys: |
            connector-fixture-${{ runner.os }}-

      - name: Restore gravityforms fixture
        id: gf-cache
        uses: actions/cache@v4
        with:
          path: tests/e2e/fixtures/gravityforms
          key: gravityforms-fixture-${{ runner.os }}-${{ steps.refs.outputs.gf }}-${{ steps.refs.outputs.boot }}
          restore-keys: |
            gravityforms-fixture-${{ runner.os }}-

      - name: Bootstrap vendor (clones connector PR #184 + Gravity Forms)
        working-directory: tests/e2e
        env:
          # GITHUB_TOKEN from the workflow has repo: read on same-org private
          # repos if the trustedlogin org gives the workflow runner that access.
          # If not, override with a PAT in repo secrets as E2E_GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./fixtures/bootstrap-vendor.sh

      - name: Bootstrap client
        working-directory: tests/e2e
        run: ./fixtures/bootstrap-client.sh

      # The vendor-wp + client-wp containers were started BEFORE the bootstraps
      # cloned trustedlogin-connector / gravityforms / built the bind-mounted
      # client plugin assets. On Linux (GH-Actions runners), the apache+mod_php
      # workers in those long-lived containers primed PHP's realpath cache with
      # the EMPTY bind-mount dirs that existed at start time. Even though the
      # bind-mounts go live the moment the host dirs get populated, the cached
      # "no such file" stat keeps wp_get_active_and_valid_plugins() skipping
      # those plugins for the realpath_cache_ttl window (default 120s) — every
      # HTTP request from Playwright then sees a vanilla WP with no connector
      # and the e2e suite cascades into 404 hell.
      #
      # Restart kills the stale PHP workers + clears realpath_cache. wp-cli is
      # unaffected because each call is a fresh PHP process. macOS Docker
      # Desktop (FUSE-backed file sharing) does not exhibit this — pure-Linux
      # bind-mounts do.
      - name: Restart WP containers to clear realpath cache
        working-directory: tests/e2e
        run: |
          docker compose restart vendor-wp client-wp
          docker compose up -d --wait vendor-wp client-wp

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npm test

      - name: Diagnose vendor REST + plugin pause state on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          echo "=== paused_plugins option (HTTP-side WP fatal protection) ==="
          docker compose run --rm -T wp-cli-vendor wp option get paused_plugins --format=json 2>&1 || true
          echo "=== active_plugins on vendor ==="
          docker compose run --rm -T wp-cli-vendor wp option get active_plugins --format=json 2>&1 || true
          echo "=== vendor wp-content/debug.log — TL-PROBE entries ==="
          docker compose exec -T vendor-wp bash -c 'test -f wp-content/debug.log && grep -F "[TL-PROBE]" wp-content/debug.log | tail -n 20 || echo "(no debug.log or no probe entries)"' || true
          echo "=== vendor wp-content/debug.log (last 200 lines, all entries) ==="
          docker compose exec -T vendor-wp bash -c 'test -f wp-content/debug.log && tail -n 200 wp-content/debug.log || echo "(no debug.log)"' || true
          echo "=== install curl + probe vendor REST endpoint over HTTP ==="
          docker compose exec -T vendor-wp bash -c 'command -v curl >/dev/null 2>&1 || (apt-get update -qq && apt-get install -yqq curl) >/dev/null 2>&1; curl -si "http://127.0.0.1/?rest_route=/trustedlogin/v1/public_key"' || true
          echo "=== probe via Host: vendor-wp ==="
          docker compose exec -T vendor-wp bash -c 'curl -si -H "Host: vendor-wp" "http://127.0.0.1/?rest_route=/trustedlogin/v1/public_key"' || true
          echo "=== probe via pretty /wp-json path ==="
          docker compose exec -T vendor-wp bash -c 'curl -si "http://127.0.0.1/wp-json/trustedlogin/v1/public_key"' || true
          echo "=== route registered in wp-cli context? ==="
          docker compose run --rm -T wp-cli-vendor wp eval 'echo isset( rest_get_server()->get_routes()["/trustedlogin/v1/public_key"] ) ? "REGISTERED\n" : "MISSING\n";' 2>&1 || true
          echo "=== same probe via rest_do_request from wp-cli ==="
          docker compose run --rm -T wp-cli-vendor wp eval '$r = rest_do_request( new WP_REST_Request( "GET", "/trustedlogin/v1/public_key" ) ); echo "status=" . $r->get_status() . " data=" . wp_json_encode( $r->get_data() ) . "\n";' 2>&1 || true
          echo "=== admin user (uid=1) TL cap state ==="
          docker compose run --rm -T wp-cli-vendor wp eval '$u = get_user_by("id", 1); if (!$u) { echo "no admin\n"; exit; } echo "user: " . $u->user_login . " roles: " . implode(",", $u->roles) . "\n"; foreach (["trustedlogin_decrypt_messages","trustedlogin_menu_access","read","manage_options"] as $c) { echo "  " . $c . " => " . ( user_can($u, $c) ? "yes" : "no" ) . "\n"; }' 2>&1 || true
          echo "=== administrator role caps (just TL ones) ==="
          docker compose run --rm -T wp-cli-vendor wp eval '$r = get_role("administrator"); if (!$r) { echo "no admin role\n"; exit; } foreach ($r->capabilities as $cap => $has) { if ($has && false !== stripos($cap, "trustedlogin")) { echo "  " . $cap . "\n"; } }' 2>&1 || true
          echo "=== migration sentinel option ==="
          docker compose run --rm -T wp-cli-vendor wp option get trustedlogin_connector_approved_roles_migrated 2>&1 || true
          echo "=== auth-cookie probe of access_key_login admin page ==="
          docker compose run --rm -T wp-cli-vendor wp eval '$cookie = wp_generate_auth_cookie( 1, time() + 3600, "logged_in" ); $r = wp_remote_get( "http://vendor-wp/wp-admin/admin.php?page=trustedlogin_access_key_login", array( "cookies" => array( LOGGED_IN_COOKIE => $cookie ), "redirection" => 0 ) ); echo "code=" . wp_remote_retrieve_response_code( $r ) . PHP_EOL; $body = wp_remote_retrieve_body( $r ); foreach ( array( "Sorry, you are", "trustedlogin_access_key_login", "do_not_allow", "wp_die", "wp-login" ) as $needle ) { echo "  has(\"" . $needle . "\")=" . ( false !== strpos( $body, $needle ) ? "yes" : "no" ) . PHP_EOL; }' 2>&1 || true

      - name: Dump fake-saas state on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          curl -s http://localhost:8003/__state || true
          docker compose logs --no-color > docker-compose.log || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
            tests/e2e/docker-compose.log
          retention-days: 14

      - name: Tear down
        if: always()
        working-directory: tests/e2e
        run: docker compose down -v || true
