name: E2E

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout client repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Start docker stack
        working-directory: tests/e2e
        run: docker compose up -d --wait

      - name: Bootstrap vendor (clones connector PR #184 + Gravity Forms)
        working-directory: tests/e2e
        env:
          # GITHUB_TOKEN from the workflow has repo: read on same-org private
          # repos if the trustedlogin org gives the workflow runner that access.
          # If not, override with a PAT in repo secrets as E2E_GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./fixtures/bootstrap-vendor.sh

      - name: Bootstrap client
        working-directory: tests/e2e
        run: ./fixtures/bootstrap-client.sh

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npm test

      - name: Diagnose vendor REST + plugin pause state on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          echo "=== paused_plugins option (HTTP-side WP fatal protection) ==="
          docker compose run --rm -T wp-cli-vendor wp option get paused_plugins --format=json 2>&1 || true
          echo
          echo "=== vendor wp-content/debug.log (last 200 lines) ==="
          docker compose exec -T vendor-wp sh -lc 'test -f wp-content/debug.log && tail -n 200 wp-content/debug.log || echo "(no debug.log)"' || true
          echo
          echo "=== HTTP probe from inside vendor-wp via 127.0.0.1 ==="
          docker compose exec -T vendor-wp sh -lc 'apt-get install -yqq curl >/dev/null 2>&1 || true; curl -si "http://127.0.0.1/?rest_route=/trustedlogin/v1/public_key" | head -40' || true
          echo
          echo "=== HTTP probe from inside vendor-wp via service hostname (Host: vendor-wp) ==="
          docker compose exec -T vendor-wp sh -lc 'curl -si -H "Host: vendor-wp" "http://127.0.0.1/?rest_route=/trustedlogin/v1/public_key" | head -40' || true
          echo
          echo "=== HTTP probe via /wp-json pretty-permalink path ==="
          docker compose exec -T vendor-wp sh -lc 'curl -si "http://127.0.0.1/wp-json/trustedlogin/v1/public_key" | head -40' || true
          echo
          echo "=== Route registered? (wp-cli view of \$wp_rest_server) ==="
          docker compose run --rm -T wp-cli-vendor wp eval '$server = rest_get_server(); $routes = $server->get_routes(); echo isset( $routes["/trustedlogin/v1/public_key"] ) ? "REGISTERED\n" : "MISSING\n";' 2>&1 || true
          echo
          echo "=== Active plugins on vendor (HTTP load order) ==="
          docker compose run --rm -T wp-cli-vendor wp option get active_plugins --format=json 2>&1 || true
          echo
          echo "=== TrustedLoginGFField + GFForms class state during HTTP request ==="
          docker compose exec -T vendor-wp sh -lc 'cat > /tmp/probe.php <<"PHPEOF"
<?php
$ch = curl_init( "http://127.0.0.1/wp-content/plugins/trustedlogin-connector/trustedlogin-connector.php" );
curl_setopt( $ch, CURLOPT_NOBODY, true );
curl_setopt( $ch, CURLOPT_RETURNTRANSFER, true );
curl_exec( $ch );
echo "direct plugin file HTTP code: " . curl_getinfo( $ch, CURLINFO_HTTP_CODE ) . "\n";
curl_close( $ch );
PHPEOF
php /tmp/probe.php 2>&1 || true' || true

      - name: Dump fake-saas state on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          curl -s http://localhost:8003/__state || true
          docker compose logs --no-color > docker-compose.log || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
            tests/e2e/docker-compose.log
          retention-days: 14

      - name: Tear down
        if: always()
        working-directory: tests/e2e
        run: docker compose down -v || true
